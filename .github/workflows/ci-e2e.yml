# ============================================================================
# Tendex AI - E2E Tests Pipeline (Playwright)
# ============================================================================
# Runs Playwright E2E tests for the frontend application.
# Triggers on PRs and pushes that modify frontend or E2E test code.
#
# Features:
# - Dual-language testing (Arabic RTL / English LTR)
# - Chromium-based testing for speed
# - HTML report and JUnit XML artifacts
# - Playwright browser caching for faster CI runs
# ============================================================================

name: CI - E2E Tests (Playwright)

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
      - ".github/workflows/ci-e2e.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
      - ".github/workflows/ci-e2e.yml"

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

env:
  NODE_VERSION: "22"
  CI: true

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [chromium-ar, chromium-en]

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ------------------------------------------------------------------
      # 3. Setup pnpm
      # ------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # ------------------------------------------------------------------
      # 4. Cache pnpm store
      # ------------------------------------------------------------------
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # ------------------------------------------------------------------
      # 5. Install dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline || pnpm install

      # ------------------------------------------------------------------
      # 6. Cache Playwright browsers
      # ------------------------------------------------------------------
      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      # ------------------------------------------------------------------
      # 7. Install Playwright browsers (if not cached)
      # ------------------------------------------------------------------
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ------------------------------------------------------------------
      # 8. Run E2E tests
      # ------------------------------------------------------------------
      - name: Run Playwright E2E tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      # ------------------------------------------------------------------
      # 9. Upload test results
      # ------------------------------------------------------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit-${{ matrix.project }}
          path: frontend/e2e-results/junit.xml
          retention-days: 14

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.project }}
          path: frontend/e2e-results/screenshots/
          retention-days: 7

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-videos-${{ matrix.project }}
          path: frontend/test-results/
          retention-days: 7
