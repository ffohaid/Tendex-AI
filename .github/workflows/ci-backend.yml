# ============================================================================
# Tendex AI - Backend CI Pipeline
# ============================================================================
# Triggers on every Pull Request that modifies backend code.
# Steps: restore dependencies, build, run unit tests, run integration tests.
# NOTE: This pipeline is CI only. CD (deployment) is deferred to Sprint 7.
# ============================================================================

name: CI - Backend (.NET)

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: backend/TendexAI.slnx

jobs:
  # ====================================================================
  # Job 1: Build & Unit Tests
  # ====================================================================
  build-and-unit-test:
    name: Build & Unit Tests (.NET 10)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup .NET SDK
      # ------------------------------------------------------------------
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ------------------------------------------------------------------
      # 3. Cache NuGet packages
      # ------------------------------------------------------------------
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ------------------------------------------------------------------
      # 4. Restore dependencies
      # ------------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      # ------------------------------------------------------------------
      # 5. Build solution (Release mode, treat warnings as errors)
      # ------------------------------------------------------------------
      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore --warnaserror

      # ------------------------------------------------------------------
      # 6. Run unit tests (exclude integration tests)
      # ------------------------------------------------------------------
      - name: Run unit tests
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage"

      # ------------------------------------------------------------------
      # 7. Upload unit test results
      # ------------------------------------------------------------------
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            backend/**/TestResults/**/*.trx
            backend/**/TestResults/**/*.xml
          retention-days: 14

  # ====================================================================
  # Job 2: Integration Tests (requires Docker for Testcontainers)
  # ====================================================================
  integration-test:
    name: Integration Tests (.NET 10 + Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-unit-test

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup .NET SDK
      # ------------------------------------------------------------------
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ------------------------------------------------------------------
      # 3. Cache NuGet packages
      # ------------------------------------------------------------------
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ------------------------------------------------------------------
      # 4. Restore dependencies
      # ------------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      # ------------------------------------------------------------------
      # 5. Build solution
      # ------------------------------------------------------------------
      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      # ------------------------------------------------------------------
      # 6. Verify Docker is available (required for Testcontainers)
      # ------------------------------------------------------------------
      - name: Verify Docker availability
        run: docker info

      # ------------------------------------------------------------------
      # 7. Run integration tests
      # ------------------------------------------------------------------
      - name: Run integration tests
        run: |
          dotnet test backend/tests/TendexAI.IntegrationTests/TendexAI.IntegrationTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --collect:"XPlat Code Coverage"
        env:
          DOTNET_ENVIRONMENT: Testing
          TESTCONTAINERS_RYUK_DISABLED: false

      # ------------------------------------------------------------------
      # 8. Upload integration test results
      # ------------------------------------------------------------------
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            backend/**/TestResults/**/*.trx
            backend/**/TestResults/**/*.xml
          retention-days: 14
