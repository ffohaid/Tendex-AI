# =============================================================================
# Tendex AI - RabbitMQ Configuration
# =============================================================================
# This file configures RabbitMQ for production-grade reliability and
# performance within the Tendex AI platform.
# =============================================================================

# --- Networking ---
# Listen on all interfaces for AMQP connections
listeners.tcp.default = 5672

# Management plugin listener
management.tcp.port = 15672

# --- Memory & Disk Alarms ---
# Set memory high watermark to 60% of available RAM
vm_memory_high_watermark.relative = 0.6

# Set disk free space limit to 1GB
disk_free_limit.absolute = 1GB

# --- Queue Defaults ---
# Default queue type for new queues (classic for compatibility)
default_queue_type = classic

# --- Consumer Timeout ---
# Consumer acknowledgement timeout (30 minutes)
consumer_timeout = 1800000

# --- Connection & Channel Limits ---
# Maximum number of channels per connection
channel_max = 128

# --- Logging ---
log.console = true
log.console.level = info
log.file.level = info

# --- Heartbeat ---
# Heartbeat timeout in seconds (60 seconds)
heartbeat = 60

# --- Publisher Confirms ---
# Enable publisher confirms by default
# (handled at channel level in application code)
