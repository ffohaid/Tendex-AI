# =============================================================================
# Tendex AI - Infrastructure Services (Docker Compose)
# =============================================================================
# This file defines the core infrastructure services required for local
# development of the Tendex AI platform. All sensitive values are loaded
# from environment variables (see .env.example for reference).
#
# Usage:
#   cp .env.example .env   # then fill in your local values
#   docker compose up -d
#
# IMPORTANT: Never commit real passwords or API keys to this file.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # SQL Server 2022 - Primary Relational Database
  # ---------------------------------------------------------------------------
  # Stores the master_platform database and per-tenant databases.
  # Supports Database-per-Tenant isolation, TDE encryption, and Ledger Tables.
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tendex-sqlserver
    hostname: tendex-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB:-2048}
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "${MSSQL_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 - Caching & Session Management
  # ---------------------------------------------------------------------------
  # Used for distributed caching, session storage, rate limiting,
  # and real-time pub/sub messaging between services.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tendex-redis
    hostname: tendex-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # RabbitMQ - Message Broker
  # ---------------------------------------------------------------------------
  # Handles asynchronous inter-service communication, event-driven workflows,
  # and background job dispatching for the platform.
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tendex-rabbitmq
    hostname: tendex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-tendex}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO - S3-Compatible Object Storage
  # ---------------------------------------------------------------------------
  # Provides file storage for RFP documents, proposals, attachments,
  # generated reports (PDF), and any binary assets uploaded by users.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: tendex-minio
    hostname: tendex-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Qdrant - Vector Database for AI / RAG
  # ---------------------------------------------------------------------------
  # Stores document embeddings for the Retrieval-Augmented Generation (RAG)
  # engine. Supports HNSW indexing, cosine similarity, and tenant-level
  # isolation via collection-based partitioning with Tenant ID payloads.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tendex-qdrant
    hostname: tendex-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

# =============================================================================
# Named Volumes - Persistent Data Storage
# =============================================================================
# Each service has a dedicated named volume to ensure data persistence
# across container restarts and recreations.
# =============================================================================
volumes:
  sqlserver-data:
    driver: local
    name: tendex-sqlserver-data
  redis-data:
    driver: local
    name: tendex-redis-data
  rabbitmq-data:
    driver: local
    name: tendex-rabbitmq-data
  minio-data:
    driver: local
    name: tendex-minio-data
  qdrant-data:
    driver: local
    name: tendex-qdrant-data

# =============================================================================
# Networks
# =============================================================================
# A dedicated bridge network for all Tendex AI infrastructure services,
# enabling inter-service communication via container hostnames.
# =============================================================================
networks:
  tendex-network:
    driver: bridge
    name: tendex-network
