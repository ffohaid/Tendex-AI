# =============================================================================
# Tendex AI - Production Docker Compose
# =============================================================================
# Production-grade orchestration for Hostinger VPS deployment.
# All sensitive values are loaded from .env.prod (never committed).
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# CRITICAL: Ensure .env.prod is created from .env.prod.example with real values.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy with SSL (Certbot / Let's Encrypt)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: tendex-nginx
    hostname: tendex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks:
      - tendex-network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Certbot - Automatic SSL Certificate Management
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: tendex-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - tendex-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend API (.NET 10)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: tendex-backend:latest
    container_name: tendex-backend
    hostname: tendex-backend
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      ConnectionStrings__MasterPlatform: ${CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION}
      ConnectionStrings__RabbitMQ: ${RABBITMQ_CONNECTION}
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__HostName: tendex-rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__VirtualHost: ${RABBITMQ_VHOST:-tendex}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Authentication__SigningKey: ${JWT_SECRET_KEY}
      Authentication__Issuer: ${JWT_ISSUER}
      Authentication__Audience: ${JWT_AUDIENCE}
      MinIO__Endpoint: ${MINIO_ENDPOINT}
      MinIO__AccessKey: ${MINIO_ACCESS_KEY}
      MinIO__SecretKey: ${MINIO_SECRET_KEY}
      MinIO__UseSSL: ${MINIO_USE_SSL:-false}
      Qdrant__Endpoint: ${QDRANT_ENDPOINT}
      Qdrant__CollectionPrefix: ${QDRANT_COLLECTION_PREFIX}
      Elasticsearch__Url: ${ELASTICSEARCH_URL}
      OpenIddict__KeyDirectory: /app/keys
    volumes:
      - openiddict-keys:/app/keys
    networks:
      - tendex-network
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Frontend (Vue.js 3 SPA served by Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Tendex AI}
    image: tendex-frontend:latest
    container_name: tendex-frontend
    hostname: tendex-frontend
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # SQL Server 2022 - Primary Relational Database
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tendex-sqlserver
    hostname: tendex-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB:-4096}
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - sqlserver-backup:/var/opt/mssql/backup
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 2048M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # SECURITY: No ports exposed to host in production.
    # Access via tendex-network only.

  # ---------------------------------------------------------------------------
  # Redis 7 - Caching & Session Management
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tendex-redis
    hostname: tendex-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-1024mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 300
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
    volumes:
      - redis-data:/data
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # RabbitMQ - Message Broker
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tendex-rabbitmq
    hostname: tendex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-tendex}

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ../infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ../infrastructure/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    # SECURITY: Management UI not exposed to host. Access via SSH tunnel only.

  # ---------------------------------------------------------------------------
  # MinIO - S3-Compatible Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: tendex-minio
    hostname: tendex-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Qdrant - Vector Database for AI / RAG
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tendex-qdrant
    hostname: tendex-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Elasticsearch - Full-text Search Engine
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: tendex-elasticsearch
    hostname: tendex-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx1024m"
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Grafana - Monitoring & Observability Dashboard
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: tendex-grafana
    hostname: tendex-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "https://${DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - tendex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# =============================================================================
# Named Volumes - Persistent Data Storage
# =============================================================================
volumes:
  sqlserver-data:
    driver: local
    name: tendex-prod-sqlserver-data
  sqlserver-backup:
    driver: local
    name: tendex-prod-sqlserver-backup
  redis-data:
    driver: local
    name: tendex-prod-redis-data
  rabbitmq-data:
    driver: local
    name: tendex-prod-rabbitmq-data
  minio-data:
    driver: local
    name: tendex-prod-minio-data
  qdrant-data:
    driver: local
    name: tendex-prod-qdrant-data
  elasticsearch-data:
    driver: local
    name: tendex-prod-elasticsearch-data
  grafana-data:
    driver: local
    name: tendex-prod-grafana-data
  certbot-webroot:
    driver: local
    name: tendex-prod-certbot-webroot
  certbot-certs:
    driver: local
    name: tendex-prod-certbot-certs
  openiddict-keys:
    driver: local
    name: tendex-prod-openiddict-keys

# =============================================================================
# Networks
# =============================================================================
networks:
  tendex-network:
    driver: bridge
    name: tendex-prod-network
